server:
  port: 8081

spring:
  application:
    name: HIS-System
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/his?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  redis:
    host: localhost
    port: 6379
    database: 0
    password: 123456

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.his.entity
  type-handlers-package: com.his.typehandler
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false

jwt:
  secret: his@2026#JwtSecretKey_1234567890_abcdefg
  expire:
    minutes: 120

# 检查结果图片物理目录（相对进程工作目录；默认指向仓库根下 HIS-TempFile）
his:
  temp-file:
    exam-result-dir: ../HIS-TempFile

logging:
  level:
    org.springframework.jdbc.core: debug
